
# Дополнительно: делаем цвета более современными и приятными
cursor #ffffff
cursor_text_color background

selection_foreground #000000
selection_background #ffffff

# =============================================
# Полезные фичи
# =============================================

# Быстрый релоад конфига
map ctrl+shift+f5 reload_config

# Открытие конфига
map ctrl+shift+f2 edit_config

# Увеличение/уменьшение шрифта
map ctrl+plus  change_font_size +2
map ctrl+minus change_font_size -2
map ctrl+0     change_font_size 0

# Разделение окон (очень удобно в Niri)
map ctrl+shift+d  launch --location=split
map ctrl+shift+enter new_window

# Копирование/вставка (стандарт для Wayland)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Прокрутка
scrollback_lines 10000
